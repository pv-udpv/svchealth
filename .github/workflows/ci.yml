name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build · vet · smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: gofmt (check)
        run: |
          unformatted=$(gofmt -l ./internal ./cmd)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Coverage
        run: |
          go test -coverprofile=cover.out \
            ./internal/checks ./internal/config ./internal/store ./internal/exporter
          go tool cover -func=cover.out | tail -1

      - name: Build
        run: go build ./...

      - name: Build binary
        run: go build -o bin/svchealth ./cmd/svchealth

      - name: Smoke test (headless)
        run: go run ./cmd/smoketest

      - name: View test (headless render)
        run: go run ./cmd/viewtest
